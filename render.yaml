services:
  - type: web
    name: prophet-daily-api
    runtime: python
    buildCommand: "pip install -r requirements.txt && apt-get install -y tesseract-ocr tesseract-ocr-chi-tra"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://surf0912.github.io"
